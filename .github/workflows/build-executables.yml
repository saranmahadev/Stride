name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.1.0)'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            output-name: stride-windows-x64.exe
            artifact-name: stride-windows
          - os: ubuntu-latest
            output-name: stride-linux-x64
            artifact-name: stride-linux
          - os: macos-latest
            output-name: stride-macos-x64
            artifact-name: stride-macos
    
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Extract Version
        id: get_version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION=${{ github.event.inputs.version }}
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(python -c "import sys; sys.path.insert(0, 'stride'); from __init__ import __version__; print(__version__)")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
        shell: bash
      
      - name: Build Stride with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: stride/__main__.py
          mode: onefile
          
          # Include all required packages
          enable-plugins: |
            anti-bloat
          
          include-package: |
            stride
            typer
            rich
            questionary
            pyfiglet
            pyyaml
            yaml
            pydantic
            pydantic_core
            supabase
            keyring
          
          # Include template data files
          include-package-data: |
            stride
          
          include-data-dir: |
            stride/templates=stride/templates
          
          # Exclude unnecessary modules for size optimization
          nofollow-import-to: |
            pytest
            unittest
            test
            tests
          
          # Output settings
          output-dir: build
          output-file: ${{ matrix.output-name }}
          
          # Metadata
          company-name: SaranMahadev
          product-name: Stride
          product-version: ${{ steps.get_version.outputs.version }}
          file-description: Stride CLI - Agent-First Framework for Sprint-Powered Development
          copyright: Copyright (c) 2025 Saran Mahadev
          
          # Optimization
          lto: yes
      
      - name: Make executable (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build
          chmod +x ${{ matrix.output-name }}
      
      - name: Test Executable
        run: |
          cd build
          ./${{ matrix.output-name }} --version
          ./${{ matrix.output-name }} --help
        shell: bash
      
      - name: Calculate SHA256
        run: |
          cd build
          if [ "${{ runner.os }}" == "Windows" ]; then
            certutil -hashfile ${{ matrix.output-name }} SHA256 | findstr /v "hash" > ${{ matrix.output-name }}.sha256
          else
            shasum -a 256 ${{ matrix.output-name }} > ${{ matrix.output-name }}.sha256
          fi
          cat ${{ matrix.output-name }}.sha256
        shell: bash
      
      - name: Get file size
        id: filesize
        run: |
          cd build
          SIZE=$(du -h ${{ matrix.output-name }} | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
        shell: bash
      
      - name: Create Info File
        run: |
          cd build
          cat > ${{ matrix.output-name }}.txt << EOF
          Stride CLI - ${{ runner.os }} Build
          ===================================
          
          Version: ${{ steps.get_version.outputs.version }}
          Platform: ${{ runner.os }}
          Architecture: x64
          Python: 3.11
          Build Date: $(date)
          File Size: ${{ steps.filesize.outputs.size }}
          
          Installation:
          -------------
          1. Download ${{ matrix.output-name }}
          2. Make executable: chmod +x ${{ matrix.output-name }} (Unix only)
          3. Run: ./${{ matrix.output-name }} --help
          
          Verify integrity:
          ----------------
          shasum -a 256 -c ${{ matrix.output-name }}.sha256
          
          Repository: https://github.com/saranmahadev/Stride
          Documentation: https://stride.saranmahadev.in
          EOF
        shell: bash
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            build/${{ matrix.output-name }}
            build/${{ matrix.output-name }}.sha256
            build/${{ matrix.output-name }}.txt
          include-hidden-files: true
          if-no-files-found: error
  
  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Combined Checksums
        run: |
          cd artifacts
          find . -name "*.sha256" -exec cat {} \; > ../CHECKSUMS.txt
          cd ..
          echo "" >> CHECKSUMS.txt
          echo "Verify with: shasum -a 256 -c CHECKSUMS.txt" >> CHECKSUMS.txt
          cat CHECKSUMS.txt
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/stride-windows/*.exe
            artifacts/stride-windows/*.sha256
            artifacts/stride-windows/*.txt
            artifacts/stride-linux/stride-linux-x64
            artifacts/stride-linux/*.sha256
            artifacts/stride-linux/*.txt
            artifacts/stride-macos/stride-macos-x64
            artifacts/stride-macos/*.sha256
            artifacts/stride-macos/*.txt
            CHECKSUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ needs.build.outputs.version || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
